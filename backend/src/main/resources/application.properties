# ─── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# Admin OTP email
admin.email=${ADMIN_EMAIL:tsribatsapatro@gmail.com}

# Frontend base URL (used in blog notification emails)
frontend.url=${FRONTEND_URL:https://tech-simplified-sribatsa.vercel.app}


# ─── Database (Neon PostgreSQL) ───────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── HikariCP connection pool ─────────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:bibhuschatgpt@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:kruw kzds honw vqir}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Timeouts — fail fast instead of hanging for minutes
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
