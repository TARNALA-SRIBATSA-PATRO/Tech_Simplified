# ─── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# Admin OTP email
admin.email=${ADMIN_EMAIL:tsribatsapatro@gmail.com}

# Frontend base URL (used in blog notification emails)
frontend.url=${FRONTEND_URL:https://tech-simplified-sribatsa.vercel.app}


# ─── Database (Neon PostgreSQL) ───────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── HikariCP connection pool ─────────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000


# ─── Brevo (HTTP email API — 300 emails/day free, no SMTP needed) ───────────────
brevo.api-key=${BREVO_API_KEY:placeholder}
brevo.sender-email=${BREVO_SENDER_EMAIL:bibhuschatgpt@gmail.com}

