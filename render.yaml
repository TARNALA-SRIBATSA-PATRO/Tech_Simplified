services:
  - type: web
    name: tech-simplified-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false          # Set in Render dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: BREVO_API_KEY
        sync: false          # Set in Render dashboard — Brevo HTTP email API key
      - key: BREVO_SENDER_EMAIL
        sync: false          # Set in Render dashboard — verified sender address in Brevo
      - key: FRONTEND_URL
        value: https://tech-simplified-sribatsa.vercel.app
