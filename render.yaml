services:
  # ── 1. Spring Boot Backend (Web Service) ────────────────────────────────────
  - type: web
    name: tech-simplified-backend
    runtime: java
    region: singapore           # pick the region closest to your users
    plan: free
    rootDir: backend
    buildCommand: mvn -B package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/tech-simplified-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/blogs
    envVars:
      - key: DB_URL
        sync: false             # fill this in the Render dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true     # Render auto-generates a secure random value
      - key: ADMIN_EMAIL
        value: tsribatsapatro@gmail.com
      - key: MAIL_USERNAME
        sync: false             # your Gmail address
      - key: MAIL_APP_PASSWORD
        sync: false             # your Gmail app password
      - key: FRONTEND_URL
        sync: false             # set to your Render frontend URL after first deploy

  # ── 2. React/Vite Frontend (Static Site) ────────────────────────────────────
  - type: web
    name: tech-simplified-frontend
    runtime: static
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      # Forward all routes to index.html for client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false             # set to https://tech-simplified-backend.onrender.com/api
